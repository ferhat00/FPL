# --- Knockout bracket (OFFICIAL FIFA 2026; see VERIFY note at top) ------------
# Slot tokens:  "1X"=winner of group X, "2X"=runner-up of group X,
#               "T1".."T8"=ranked best-third placed teams (1=best),
#               "W:<match_id>"=winner of an earlier match.
# `id` values are the official FIFA match numbers (M73-M104). `eligible_groups`
# (present on winner-vs-third ties only) restricts which group's third-placed
# team may occupy that slot — the constrained assignment is solved at run time
# (worldcup2026/model/bracket.py::assign_thirds). Third tokens map to FIFA slots
# in match-number order: M74->T1, M77->T2, M79->T3, M80->T4, M81->T5, M82->T6,
# M85->T7, M87->T8.
bracket:
  round_of_32:                              # FIFA matches 73-88
    - {id: M73, top: "2A", bottom: "2B"}
    - {id: M74, top: "1E", bottom: "T1", eligible_groups: ["A", "B", "C", "D", "F"]}
    - {id: M75, top: "1F", bottom: "2C"}
    - {id: M76, top: "1C", bottom: "2F"}
    - {id: M77, top: "1I", bottom: "T2", eligible_groups: ["C", "D", "F", "G", "H"]}
    - {id: M78, top: "2E", bottom: "2I"}
    - {id: M79, top: "1A", bottom: "T3", eligible_groups: ["C", "E", "F", "H", "I"]}
    - {id: M80, top: "1L", bottom: "T4", eligible_groups: ["E", "H", "I", "J", "K"]}
    - {id: M81, top: "1D", bottom: "T5", eligible_groups: ["B", "E", "F", "I", "J"]}
    - {id: M82, top: "1G", bottom: "T6", eligible_groups: ["A", "E", "H", "I", "J"]}
    - {id: M83, top: "2K", bottom: "2L"}
    - {id: M84, top: "1H", bottom: "2J"}
    - {id: M85, top: "1B", bottom: "T7", eligible_groups: ["E", "F", "G", "I", "J"]}
    - {id: M86, top: "1J", bottom: "2H"}
    - {id: M87, top: "1K", bottom: "T8", eligible_groups: ["D", "E", "I", "J", "L"]}
    - {id: M88, top: "2D", bottom: "2G"}
  round_of_16:                              # FIFA matches 89-96
    - {id: M89, top: "W:M74", bottom: "W:M77"}
    - {id: M90, top: "W:M73", bottom: "W:M75"}
    - {id: M91, top: "W:M76", bottom: "W:M78"}
    - {id: M92, top: "W:M79", bottom: "W:M80"}
    - {id: M93, top: "W:M83", bottom: "W:M84"}
    - {id: M94, top: "W:M81", bottom: "W:M82"}
    - {id: M95, top: "W:M86", bottom: "W:M88"}
    - {id: M96, top: "W:M85", bottom: "W:M87"}
  quarter_finals:                           # FIFA matches 97-100
    - {id: M97, top: "W:M89", bottom: "W:M90"}
    - {id: M98, top: "W:M93", bottom: "W:M94"}
    - {id: M99, top: "W:M91", bottom: "W:M92"}
    - {id: M100, top: "W:M95", bottom: "W:M96"}
  semi_finals:                              # FIFA matches 101-102
    - {id: M101, top: "W:M97", bottom: "W:M98"}
    - {id: M102, top: "W:M99", bottom: "W:M100"}
  final:                                    # FIFA match 104 (M103 = 3rd-place, not modelled)
    - {id: M104, top: "W:M101", bottom: "W:M102"}
