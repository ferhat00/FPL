# --- Knockout bracket (data-driven; see VERIFY note at top) ------------------
# Slot tokens:  "1X"=winner of group X, "2X"=runner-up of group X,
#               "T1".."T8"=ranked best-third placed teams (1=best),
#               "W:<match_id>"=winner of an earlier match.
# Structure: 8x (winner vs third) + 4x (winner vs runner-up) + 4x (runner-up vs
# runner-up) = 16 R32 ties, then standard single elimination.
bracket:
  round_of_32:
    - {id: R32_01, top: "1A", bottom: "T1"}
    - {id: R32_02, top: "1B", bottom: "T2"}
    - {id: R32_03, top: "1C", bottom: "T3"}
    - {id: R32_04, top: "1D", bottom: "T4"}
    - {id: R32_05, top: "1E", bottom: "T5"}
    - {id: R32_06, top: "1F", bottom: "T6"}
    - {id: R32_07, top: "1G", bottom: "T7"}
    - {id: R32_08, top: "1H", bottom: "T8"}
    - {id: R32_09, top: "1I", bottom: "2A"}
    - {id: R32_10, top: "1J", bottom: "2B"}
    - {id: R32_11, top: "1K", bottom: "2C"}
    - {id: R32_12, top: "1L", bottom: "2D"}
    - {id: R32_13, top: "2E", bottom: "2F"}
    - {id: R32_14, top: "2G", bottom: "2H"}
    - {id: R32_15, top: "2I", bottom: "2J"}
    - {id: R32_16, top: "2K", bottom: "2L"}
  round_of_16:
    - {id: R16_1, top: "W:R32_01", bottom: "W:R32_02"}
    - {id: R16_2, top: "W:R32_03", bottom: "W:R32_04"}
    - {id: R16_3, top: "W:R32_05", bottom: "W:R32_06"}
    - {id: R16_4, top: "W:R32_07", bottom: "W:R32_08"}
    - {id: R16_5, top: "W:R32_09", bottom: "W:R32_10"}
    - {id: R16_6, top: "W:R32_11", bottom: "W:R32_12"}
    - {id: R16_7, top: "W:R32_13", bottom: "W:R32_14"}
    - {id: R16_8, top: "W:R32_15", bottom: "W:R32_16"}
  quarter_finals:
    - {id: QF_1, top: "W:R16_1", bottom: "W:R16_2"}
    - {id: QF_2, top: "W:R16_3", bottom: "W:R16_4"}
    - {id: QF_3, top: "W:R16_5", bottom: "W:R16_6"}
    - {id: QF_4, top: "W:R16_7", bottom: "W:R16_8"}
  semi_finals:
    - {id: SF_1, top: "W:QF_1", bottom: "W:QF_2"}
    - {id: SF_2, top: "W:QF_3", bottom: "W:QF_4"}
  final:
    - {id: FINAL, top: "W:SF_1", bottom: "W:SF_2"}
