# =============================================================================
# 2026 FIFA World Cup — tournament definition
# =============================================================================
# Source of group draw: official Final Draw, 5 Dec 2025, Washington D.C.
# (cross-checked against en.wikipedia.org/wiki/2026_FIFA_World_Cup_draw).
#
# VERIFY FLAGS:
#   * Slots marked `playoff: true` were decided by the March-2026 play-offs
#     (UEFA paths + intercontinental). Confirm the winning nation is correct.
#   * The `bracket` section encodes the OFFICIAL FIFA 2026 knockout map (match
#     numbers 73-104), cross-verified against the published bracket. Each
#     winner-vs-third tie carries the official `eligible_groups` list (FIFA
#     Annex C) restricting which group's third-placed team may fill that slot.
#     Editing this YAML re-wires the whole simulation.
#
# The `teams` block holds an APPROXIMATE offline snapshot of strength/value
# attributes used ONLY when live ETL (Kaggle/eloratings.net/Transfermarkt) is
# unavailable. Live ETL always overrides these values.
# =============================================================================

meta:
  name: "2026 FIFA World Cup"
  hosts: ["United States", "Canada", "Mexico"]
  n_teams: 48
  n_groups: 12
  opening_match_date: "2026-06-11"
  group_stage_end: "2026-06-27"
  round_of_32: ["2026-06-28", "2026-07-03"]
  round_of_16: ["2026-07-04", "2026-07-07"]
  quarter_finals: ["2026-07-09", "2026-07-11"]
  semi_finals: ["2026-07-14", "2026-07-15"]
  third_place: "2026-07-18"
  final_date: "2026-07-19"
  final_venue: "MetLife Stadium, East Rutherford, NJ"

# --- Group allocations (draw order = seeding pot order) ----------------------
groups:
  A: ["Mexico", "South Africa", "South Korea", "Czech Republic"]
  B: ["Canada", "Bosnia and Herzegovina", "Qatar", "Switzerland"]
  C: ["Brazil", "Morocco", "Haiti", "Scotland"]
  D: ["United States", "Paraguay", "Australia", "Turkey"]
  E: ["Germany", "Curacao", "Ivory Coast", "Ecuador"]
  F: ["Netherlands", "Japan", "Sweden", "Tunisia"]
  G: ["Belgium", "Egypt", "Iran", "New Zealand"]
  H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"]
  I: ["France", "Senegal", "Iraq", "Norway"]
  J: ["Argentina", "Algeria", "Austria", "Jordan"]
  K: ["Portugal", "DR Congo", "Uzbekistan", "Colombia"]
  L: ["England", "Croatia", "Ghana", "Panama"]

# Slots whose occupant was decided by a March-2026 play-off (verify identity).
playoff_slots: ["Czech Republic", "Bosnia and Herzegovina", "Turkey",
                "Sweden", "Iraq", "DR Congo"]

